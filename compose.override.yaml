# ローカル開発用の上書き設定。
# `docker compose up` 実行時に compose.yaml と自動的にマージされる。
services:
  frontend:
    build:
      target: dev
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules

  backend:
    build:
      target: dev
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/var/www/html
      - backend-vendor:/var/www/html/vendor
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ジョブが$timeoutを超過した場合、Laravelのqueue:workはSIGALRMハンドラ経由で
  # ワーカープロセス自体をexit()させる(1ジョブだけを失敗させるのではなく、
  # プロセス全体を終了させる設計 ―― Redisのretry_after経過後に別ワーカーが
  # 再取得することを前提にしている)。本番はcompose.prod.yamlでrestart:
  # unless-stoppedが付くため自動復帰するが、開発環境ではrestart指定が無く、
  # 一度クラッシュすると誰かが気づいて手動再起動するまでそのワーカーが
  # 担当するキューの処理が完全に止まってしまう。on-failureで自動復帰させる。
  queue-worker:
    build:
      target: dev
    volumes:
      - ./backend:/var/www/html
      - backend-vendor:/var/www/html/vendor
    restart: on-failure

  queue-worker-heavy:
    build:
      target: dev
    volumes:
      - ./backend:/var/www/html
      - backend-vendor:/var/www/html/vendor
    restart: on-failure

  queue-worker-external:
    build:
      target: dev
    volumes:
      - ./backend:/var/www/html
      - backend-vendor:/var/www/html/vendor
    restart: on-failure

  scheduler:
    build:
      target: dev
    volumes:
      - ./backend:/var/www/html
      - backend-vendor:/var/www/html/vendor

  analyzer:
    build:
      target: dev
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    volumes:
      - ./analyzer:/app
      - analyzer-node-modules:/app/node_modules
    # analyzerの動作を直接確認したい場合のみ、以下のコメントを外してホストに公開する。
    # ports:
    #   - "3001:3001"
