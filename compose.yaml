name: website-comparison

x-backend-env: &backend-env
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_DATABASE: ${POSTGRES_DB:-website_comparison}
  DB_USERNAME: ${POSTGRES_USER:-app}
  DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  QUEUE_CONNECTION: redis
  CACHE_STORE: redis
  SESSION_DRIVER: redis
  MAIL_HOST: mailpit
  MAIL_PORT: "1025"
  FRONTEND_URL: http://localhost:${FRONTEND_PORT:-3000}
  SANCTUM_STATEFUL_DOMAINS: localhost:${FRONTEND_PORT:-3000}
  ANALYZER_URL: http://analyzer:3001
  ANALYZER_TOKEN: ${ANALYZER_TOKEN:-}
  ANALYSIS_STORAGE_PATH: ${ANALYSIS_STORAGE_PATH:-/var/analysis-storage}
  CRAWLER_USER_AGENT: ${CRAWLER_USER_AGENT:-WebsiteComparisonBot/0.1 (+https://example.com/bot)}
  SEO_PROVIDER: ${SEO_PROVIDER:-mock}
  SEMRUSH_API_KEY: ${SEMRUSH_API_KEY:-}
  SEMRUSH_DATABASE: ${SEMRUSH_DATABASE:-jp}
  SEMRUSH_TIMEOUT: ${SEMRUSH_TIMEOUT:-30}
  SEMRUSH_MAX_RETRIES: ${SEMRUSH_MAX_RETRIES:-1}
  SEMRUSH_DAILY_UNIT_LIMIT: ${SEMRUSH_DAILY_UNIT_LIMIT:-}

services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # NEXT_PUBLIC_*はビルド時にJSバンドルへ焼き込まれるため、
        # containerの environment: だけでは本番ビルドに反映されない。
        # 本番でドメインが変わる場合は、ルートの.envでNEXT_PUBLIC_API_URLを
        # 直接上書きすること (例: https://api.example.com)。
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:${BACKEND_PORT:-8000}}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:${BACKEND_PORT:-8000}}
      INTERNAL_API_URL: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks: [app-network]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      <<: *backend-env
    volumes:
      - analysis-storage:/var/analysis-storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [app-network]

  queue-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      <<: *backend-env
    volumes:
      - analysis-storage:/var/analysis-storage
    command: ["php", "artisan", "queue:work", "redis", "--queue=default,analysis,reports", "--sleep=3", "--tries=3", "--timeout=300"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [app-network]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Semrush等の外部API呼び出しは専用キュー(external-api)・専用ワーカーへ隔離する。
  # 外部APIのレート制限・障害・タイムアウトが、通常のanalysisキューの処理
  # (ページ取得・レンダリング等)に波及しないようにするため。
  queue-worker-external:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      <<: *backend-env
    volumes:
      - analysis-storage:/var/analysis-storage
    command: ["php", "artisan", "queue:work", "redis", "--queue=external-api", "--sleep=3", "--tries=2", "--timeout=60"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [app-network]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  queue-worker-heavy:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      <<: *backend-env
    volumes:
      - analysis-storage:/var/analysis-storage
    command: ["php", "artisan", "queue:work", "redis", "--queue=analysis-heavy", "--sleep=3", "--tries=2", "--timeout=600"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [app-network]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  scheduler:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      <<: *backend-env
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [app-network]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'schedule:work' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  analyzer:
    build:
      context: .
      dockerfile: analyzer/Dockerfile
    environment:
      PORT: "3001"
      HOST: "0.0.0.0"
      LOG_LEVEL: info
      ANALYZER_TOKEN: ${ANALYZER_TOKEN:-}
      ANALYZER_MAX_CONCURRENCY: ${ANALYZER_MAX_CONCURRENCY:-2}
      ANALYSIS_STORAGE_PATH: ${ANALYSIS_STORAGE_PATH:-/var/analysis-storage}
      CRAWLER_USER_AGENT: ${CRAWLER_USER_AGENT:-WebsiteComparisonBot/0.1 (+https://example.com/bot)}
    volumes:
      - analysis-storage:/var/analysis-storage
    expose:
      - "3001"
    networks: [app-network]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-website_comparison}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [app-network]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-website_comparison}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    networks: [app-network]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_PORT:-8025}:8025"
    networks: [app-network]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  backend-vendor:
  backend-storage:
  backend-public:
  frontend-node-modules:
  analyzer-node-modules:
  # backendとanalyzerで共有する分析結果ストレージ(生HTML/スクリーンショット/
  # Lighthouse生JSON等)。screenshotはanalyzerが直接書き込み、Laravelは
  # 認可チェックを経由して配信する(analyzerを直接公開しない)。
  analysis-storage:
