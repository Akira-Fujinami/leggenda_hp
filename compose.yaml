name: website-comparison

x-backend-env: &backend-env
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_DATABASE: ${POSTGRES_DB:-website_comparison}
  DB_USERNAME: ${POSTGRES_USER:-app}
  DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  QUEUE_CONNECTION: redis
  CACHE_STORE: redis
  SESSION_DRIVER: redis
  MAIL_HOST: mailpit
  MAIL_PORT: "1025"
  FRONTEND_URL: http://localhost:${FRONTEND_PORT:-3000}
  SANCTUM_STATEFUL_DOMAINS: localhost:${FRONTEND_PORT:-3000}
  ANALYZER_URL: http://analyzer:3001
  ANALYZER_TOKEN: ${ANALYZER_TOKEN:-}
  ANALYSIS_STORAGE_PATH: ${ANALYSIS_STORAGE_PATH:-/var/analysis-storage}
  CRAWLER_USER_AGENT: ${CRAWLER_USER_AGENT:-WebsiteComparisonBot/0.1 (+https://example.com/bot)}
  ALLOW_MOCK_PROVIDERS: ${ALLOW_MOCK_PROVIDERS:-false}
  SEO_PROVIDER: ${SEO_PROVIDER:-mock}
  SEMRUSH_API_KEY: ${SEMRUSH_API_KEY:-}
  SEMRUSH_DATABASE: ${SEMRUSH_DATABASE:-jp}
  SEMRUSH_TIMEOUT: ${SEMRUSH_TIMEOUT:-30}
  SEMRUSH_MAX_RETRIES: ${SEMRUSH_MAX_RETRIES:-1}
  SEMRUSH_DAILY_UNIT_LIMIT: ${SEMRUSH_DAILY_UNIT_LIMIT:-}
  SEMRUSH_CACHE_TTL_HOURS: ${SEMRUSH_CACHE_TTL_HOURS:-24}
  AI_PROVIDER: ${AI_PROVIDER:-mock}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
  AI_TIMEOUT: ${AI_TIMEOUT:-60}
  AI_MAX_RETRIES: ${AI_MAX_RETRIES:-1}
  AI_MAX_INPUT_TOKENS: ${AI_MAX_INPUT_TOKENS:-}
  AI_MAX_OUTPUT_TOKENS: ${AI_MAX_OUTPUT_TOKENS:-2000}

services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # NEXT_PUBLIC_*はビルド時にJSバンドルへ焼き込まれるため、
        # containerの environment: だけでは本番ビルドに反映されない。
        # 同一Origin BFFプロキシ(frontend/src/app/backend/[...path]/route.ts)経由で
        # backendへアクセスするため、常に"/backend"を指す(直接backendのURLは指さない)。
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/backend}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/backend}
      # BACKEND_URL/FRONTEND_ORIGINはRoute Handlerがサーバーサイドでのみ使う値
      # (NEXT_PUBLIC_を付けないため、ブラウザ/JSバンドルには一切含まれない)。
      BACKEND_URL: http://backend:8000
      FRONTEND_ORIGIN: http://localhost:${FRONTEND_PORT:-3000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks: [app-network]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      <<: *backend-env
    volumes:
      - analysis-storage:/var/analysis-storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [app-network]

  queue-worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      <<: *backend-env
    volumes:
      - analysis-storage:/var/analysis-storage
    command: ["php", "artisan", "queue:work", "redis", "--queue=default,analysis,reports", "--sleep=3", "--tries=3", "--timeout=300"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [app-network]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Semrush・AI Provider等の外部API呼び出しは専用キュー(external-api, ai)・
  # 専用ワーカーへ隔離する。外部APIのレート制限・障害・タイムアウトが、通常の
  # analysisキューの処理(ページ取得・レンダリング等)に波及しないようにするため。
  # aiはAI分析(GenerateAiAnalysisJob)専用のキュー名で、external-apiと同じ
  # ワーカーが処理する(どちらも「サードパーティAPI呼び出し」という性質が
  # 同じで、隔離の目的を共有するため、コンテナを分けるほどの独立性は不要と判断)。
  queue-worker-external:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      <<: *backend-env
    volumes:
      - analysis-storage:/var/analysis-storage
    command: ["php", "artisan", "queue:work", "redis", "--queue=external-api,ai", "--sleep=3", "--tries=2", "--timeout=90"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [app-network]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  queue-worker-heavy:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      <<: *backend-env
    volumes:
      - analysis-storage:/var/analysis-storage
    command: ["php", "artisan", "queue:work", "redis", "--queue=analysis-heavy", "--sleep=3", "--tries=2", "--timeout=600"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [app-network]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  scheduler:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      <<: *backend-env
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [app-network]
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'schedule:work' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  analyzer:
    build:
      context: .
      dockerfile: analyzer/Dockerfile
    environment:
      PORT: "3001"
      HOST: "0.0.0.0"
      LOG_LEVEL: info
      ANALYZER_TOKEN: ${ANALYZER_TOKEN:-}
      ANALYZER_MAX_CONCURRENCY: ${ANALYZER_MAX_CONCURRENCY:-2}
      ANALYSIS_STORAGE_PATH: ${ANALYSIS_STORAGE_PATH:-/var/analysis-storage}
      CRAWLER_USER_AGENT: ${CRAWLER_USER_AGENT:-WebsiteComparisonBot/0.1 (+https://example.com/bot)}
    volumes:
      - analysis-storage:/var/analysis-storage
    expose:
      - "3001"
    networks: [app-network]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-website_comparison}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [app-network]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-website_comparison}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    networks: [app-network]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "${MAILPIT_PORT:-8025}:8025"
    networks: [app-network]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  backend-vendor:
  backend-storage:
  backend-public:
  frontend-node-modules:
  analyzer-node-modules:
  # backendとanalyzerで共有する分析結果ストレージ(生HTML/スクリーンショット/
  # Lighthouse生JSON等)。screenshotはanalyzerが直接書き込み、Laravelは
  # 認可チェックを経由して配信する(analyzerを直接公開しない)。
  analysis-storage:
